name: CI Pipeline Juego Rol

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      # --- CONFIGURACIÓN DE ENTORNO ---
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # --- BACKEND ---

      - name: Iniciar Base de Datos (Docker)
        working-directory: ./Backend
        run: docker-compose up -d

      - name: Permisos de ejecución para Gradlew
        working-directory: ./Backend
        run: chmod +x gradlew

      - name: Ejecutar Gradle Tasks
        working-directory: ./Backend
        run: ./gradlew tasks

      - name: Iniciar Backend (bootRun)
        working-directory: ./Backend
        # Usamos '&' para que corra en segundo plano y no bloquee la Action
        run: |
          ./gradlew bootRun & 
          echo "Esperando a que el backend arranque..."
          sleep 60 

      # --- FRONTEND ---

      - name: Instalar dependencias de Angular
        working-directory: ./frontend/JuegoRolPagina
        run: npm install

      - name: Instalar Angular CLI
        run: npm install -g @angular/cli

      - name: Iniciar Frontend (ng serve)
        working-directory: ./frontend/JuegoRolPagina
        # Se lanza en background para validar que compila correctamente
        run: |
          ng serve &
          echo "Frontend lanzado correctamente"
          sleep 30
