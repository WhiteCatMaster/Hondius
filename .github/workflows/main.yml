name: CI Pipeline Juego Rol

# Se ejecuta solo en la rama main cada vez que haces un push (commit)
on:
  push:
    branches: [ "main" ]

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      # --- CONFIGURACIÓN DE ENTORNO ---

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          # Nota: Se ha quitado el cache-dependency-path para evitar errores de ruta

      # --- BACKEND ---

      - name: Iniciar Base de Datos (Docker)
        working-directory: ./Backend
        # En GitHub Actions no es necesario usar 'sudo' para docker-compose
        run: docker-compose up -d

      - name: Permisos de ejecución para Gradlew
        working-directory: ./Backend
        run: chmod +x gradlew

      - name: Ejecutar Gradle Tasks
        working-directory: ./Backend
        run: ./gradlew tasks

      - name: Iniciar Backend (bootRun)
        working-directory: ./Backend
        # Usamos '&' para que corra en segundo plano, ya que bootRun no termina por sí solo
        run: |
          ./gradlew bootRun &
          echo "Esperando a que el backend arranque..."
          sleep 60

      # --- FRONTEND ---

      - name: Instalar dependencias de Angular
        working-directory: ./Frontend/JuegoRolPagina
        run: npm install

      - name: Instalar Angular CLI
        run: npm install -g @angular/cli

      - name: Iniciar Frontend (ng serve)
        working-directory: ./Frontend/JuegoRolPagina
        # ng serve también es persistente, lo lanzamos en background para validar compilación
        run: |
          ng serve &
          echo "Frontend lanzado correctamente"
          sleep 30name: CI Pipeline Juego Rol

